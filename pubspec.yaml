name: space_connect
description: "SpaceConnect - Explore o universo com a NASA APOD"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  connectivity_plus: ^6.0.0 # Para verificar conectividade de internet

  # Existing dependencies
  shared_preferences: ^2.3.2
  http: ^1.2.2
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  firebase_core: ^3.15.2
  provider: ^6.1.5+1
  intl: ^0.20.2
  firebase_auth: ^5.7.0
  get_it: ^9.2.1
  cloud_firestore: ^5.6.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
