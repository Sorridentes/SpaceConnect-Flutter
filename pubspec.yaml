name: space_connect
description: "SpaceConnect - Explore o universo com a NASA APOD"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # Existing dependencies
  provider: ^6.1.2
  get_it: ^7.7.0
  shared_preferences: ^2.3.2
  http: ^1.2.2
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
